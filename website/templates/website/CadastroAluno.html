<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Usuário - IFWatch</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: linear-gradient(120deg, #6f86ff, #8fd3c8, #d6a4ff);
        }

        .container {
            width: 1000px;
            padding: 40px;
        }

        /* topo */
        .topo {
            position: relative;
            margin-bottom: 40px;
        }

        .voltar {
            position: absolute;
            left: 0;
            top: 0;
            background: #0a8f2d;
            color: white;
            padding: 10px 30px;
            border-radius: 25px;
            text-decoration: none;
        }

        .titulo {
            text-align: center;
            font-size: 40px;
            color: #4c6ef5;
            font-weight: 600;
        }

        /* layout */
        .conteudo {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* avatar */
        .avatar {
            position: relative;
        }

        .avatar img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .camera {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 50px;
            height: 50px;
            background: #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
        }

        #upload {
            display: none;
        }

        /* formulário */
        .form {
            width: 400px;
        }

        .form label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 18px;
        }

        .obrigatorio {
            color: red;
        }

        .input-box {
            position: relative;
        }

        .form input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #999;
            background: #ddd;
            outline: none;
            box-shadow: 5px 5px 0px #222;
        }

        .olho {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
        }

        /* botão */
        .btn {
            margin-top: 40px;
            background: #0a8f2d;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
        }

        .btn:hover {
            background: #067022;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="topo">
        <a href="menuCadastro" class="voltar">Voltar</a>
        <div class="titulo">Cadastro usuário</div>
    </div>

    <div class="conteudo">

        <!-- AVATAR QUE SEMPRE FUNCIONA -->
        <div class="avatar">
            <img id="preview" src="data:image/svg+xml;utf8,
            <svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'>
            <circle cx='110' cy='110' r='110' fill='%23444'/>
            <circle cx='110' cy='90' r='40' fill='%23ccc'/>
            <rect x='55' y='130' width='110' height='60' rx='30' fill='%23ccc'/>
            </svg>">

            <div class="camera" onclick="document.getElementById('upload').click()">📸</div>

            <input type="file" id="upload" accept="image/*">
        </div>

        <!-- formulário -->
        <div class="form">

            <label>Nome Usuario <span class="obrigatorio">*</span></label>
            <div class="input-box">
                <input type="text" placeholder="Nome:">
            </div>

            <label>Email <span class="obrigatorio">*</span></label>
            <div class="input-box">
                <input type="email" placeholder="Email:">
            </div>

            <label>Senha <span class="obrigatorio">*</span></label>
            <div class="input-box">
                <input type="password" id="senha" placeholder="Senha:">
                <span class="olho" onclick="toggleSenha('senha')">👁️‍🗨️</span>
            </div>

            <label>Confirma senha <span class="obrigatorio">*</span></label>
            <div class="input-box">
                <input type="password" id="confirmar" placeholder="Senha:">
                <span class="olho" onclick="toggleSenha('confirmar')">👁️‍🗨️</span>
            </div>

            <button class="btn">Cadastrar</button>

        </div>

    </div>

</div>

<script>
/* upload da imagem */
document.getElementById('upload').addEventListener('change', function(event){
    const file = event.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            document.getElementById('preview').src = e.target.result;
        }
        reader.readAsDataURL(file);
    }
});

/* mostrar/ocultar senha */
function toggleSenha(id){
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
