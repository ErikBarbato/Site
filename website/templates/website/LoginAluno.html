<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IFWatch</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: linear-gradient(120deg, #6f86ff, #8fd3c8, #d6a4ff);
        }

        .container {
            width: 800px;
            padding: 40px;
            text-align: center;
        }

        /* topo */
        .topo {
            position: relative;
            margin-bottom: 60px;
        }

        .voltar {
            position: absolute;
            left: 0;
            top: 0;
            background: #0a8f2d;
            color: white;
            padding: 8px 25px;
            border-radius: 20px;
            text-decoration: none;
        }

        .titulo {
            font-size: 36px;
            color: #4c6ef5;
            font-weight: 600;
        }

        /* form */
        .form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .campo {
            width: 300px;
            text-align: left;
        }

        label {
            font-size: 15px;
        }

        .obrigatorio {
            color: red;
        }

        /* input */
        .input-box {
            position: relative;
            margin-top: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #888;
            background: #ddd;
            box-shadow: 4px 4px 0px #222;
            outline: none;
        }

        /* olho */
        .olho {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        /* botão */
        .btn {
            margin-top: 40px;
            background: #0a8f2d;
            color: white;
            padding: 12px 45px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
        }

        .btn:hover {
            background: #067022;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="topo">
            <a href="menuLogin" class="voltar">Voltar</a>
            <div class="titulo">Login Aluno</div>
        </div>

        <form class="form">

            <!-- Email -->
            <div class="campo">
                <label>Email <span class="obrigatorio">*</span></label>
                <div class="input-box">
                    <input type="email" placeholder="Email:">
                </div>
            </div>

            <!-- Senha -->
            <div class="campo">
                <label>Senha <span class="obrigatorio">*</span></label>
                <div class="input-box">
                    <input type="password" id="senha" placeholder="Senha:">
                    <span class="olho" onclick="toggleSenha()">👁️‍🗨️</span>
                </div>
            </div>

            <button class="btn">Entra</button>

        </form>

    </div>

    <script>
        function toggleSenha() {
            const input = document.getElementById("senha");
            input.type = input.type === "password" ? "text" : "password";
        }
    </script>

</body>

</html>
