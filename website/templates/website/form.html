{% extends "website/modelo.html" %}

{% load static %}
{% load crispy_forms_tags %}


{% block conteudo %}
<div class="container">
  <h2 class="text-center border-bottom pb-2 mb-4">{{ titulo }}</h2>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <form method="post">

          {% csrf_token %}

          {{ form|crispy }}


          {% if botao == "Excluir"%}

            <h4>Deseja realmente excluir este item?</h4>

            <div class="alert alert-danger fs-5" role="alert">
              {{ object }}
            </div>

            <button type="submit" class="btn btn-danger">
                Sim, excluir
            </button>

          {% else %}
            <button type="submit" class="btn btn-primary">
                {{ botao }}
            </button>
          {% endif %}
          
      </form>
    </div>
  </div>

</div>
{% endblock conteudo %}
